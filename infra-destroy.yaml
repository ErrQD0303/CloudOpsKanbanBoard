trigger: none

pr: none # Disablee Pull Request triggern to 'default' branch, which is 'main' in this case. We only want to trigger on release branches.

variables:
  - group: infra-provision-pipeline-vars-group

stages:
  - stage: Plan
    displayName: "Stage 1: Plan Destroy"
    jobs:
      - job: Plan_Destroy
        displayName: "Plan Destroy Infrastructure"
        pool:
          name: "Default"
        steps:
          - checkout: self
            clean: true

          - task: TerraformInstaller@1
            displayName: "Install Terraform"
            inputs:
              terraformVersion: "latest"

          - task: TerraformTask@5
            displayName: "tf init"
            inputs:
              provider: "azurerm"
              command: "init"
              workingDirectory: "$(System.DefaultWorkingDirectory)/terraform"
              backendServiceArm: "CloudOpsKanbanBoardServiceConnection"
              backendAzureRmResourceGroupName: "$(TF_VAR_RESOURCE_GROUP_NAME)"
              backendAzureRmStorageAccountName: "$(TF_VAR_STORAGE_ACCOUNT_NAME)"
              backendAzureRmContainerName: "$(TF_VAR_CONTAINER_NAME)"
              backendAzureRmKey: "$(TF_VAR_ENVIRONMENT).tfstate"

          - task: TerraformTask@5
            displayName: "tf validate"
            inputs:
              provider: "azurerm"
              command: "validate"

          - task: TerraformTask@5
            displayName: "tf fmt"
            inputs:
              provider: "azurerm"
              command: "custom"
              outputTo: "console"
              customCommand: "fmt"
              environmentServiceNameAzureRM: "CloudOpsKanbanBoardServiceConnection"

          - task: TerraformTask@5
            displayName: "tf plan"
            inputs:
              provider: "azurerm"
              command: "plan"
              workingDirectory: "$(System.DefaultWorkingDirectory)/terraform"
              commandOptions: "-destroy -out $(Build.ArtifactStagingDirectory)/destroy.tfplan"
              environmentServiceNameAzureRM: "CloudOpsKanbanBoardServiceConnection"

  - stage: Approval
    displayName: "Stage 2: Manual approval"
    dependsOn: Plan
    jobs:
      - job: Wait_For_Validation
        displayName: "Wait for external validation before destroying infrastructure"
        pool: server
        timeoutInMinutes: 4320 # 4 days
        steps:
          - task: ManualValidation@1
            inputs:
              notifyUsers: "datvipcrvn3396@gmail.com,quocdat3396@gmail.com"
              approvers: "datvipcrvn3396@gmail.com"
              instructions: "Please review the Terraform plan for destroying infrastructure and approve if everything looks good. If you have any concerns, please reject and provide feedback."

  - stage: Destroy
    displayName: "Stage 3: Destroy Infrastructure"
    dependsOn: Approval
    jobs:
      - job: Destroy_Infrastructure
        displayName: "Destroy Terraform Infrastructure"
        pool:
          name: "Default"
        steps:
          - checkout: self
            clean: true

          - task: TerraformInstaller@1
            displayName: "Install Terraform"
            inputs:
              terraformVersion: "latest"

          - task: TerraformTask@5
            displayName: "tf init"
            inputs:
              provider: "azurerm"
              command: "init"
              workingDirectory: "$(System.DefaultWorkingDirectory)/terraform"
              backendServiceArm: "CloudOpsKanbanBoardServiceConnection"
              backendAzureRmResourceGroupName: "$(TF_VAR_RESOURCE_GROUP_NAME)"
              backendAzureRmStorageAccountName: "$(TF_VAR_STORAGE_ACCOUNT_NAME)"
              backendAzureRmContainerName: "$(TF_VAR_CONTAINER_NAME)"
              backendAzureRmKey: "$(TF_VAR_ENVIRONMENT).tfstate"

          - task: TerraformTask@5
            displayName: "tf destroy"
            inputs:
              provider: "azurerm"
              command: "destroy"
              workingDirectory: "$(System.DefaultWorkingDirectory)/terraform"
              commandOptions: "-auto-approve"
              environmentServiceNameAzureRM: "CloudOpsKanbanBoardServiceConnection"
