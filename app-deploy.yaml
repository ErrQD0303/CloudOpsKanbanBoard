trigger:
  branches:
    include:
      - release/*
  paths:
    include:
      - "ClientApp/**"
      - "ServerApp/**"

variables:
  - group: infra-provision-pipeline-vars-group

stages:
  - stage: Build
    displayName: "Build Application"
    jobs:
      - job: Build_Frontend
        displayName: "Build Frontend"
        pool:
          name: "Default"
        steps:
          - checkout: self
            clean: "true"

          - task: Bash@3
            displayName: "Build Fronend Application"
            inputs:
              targetType: "inline"
              script: |
                SCRIPT_FILE=./scripts/build-frontend-app.sh
                                
                                sed -i 's/\r//g' scripts/build-frontend-app.sh

                                chmod +x $SCRIPT_FILE

                                $SCRIPT_FILE
              workingDirectory: "$(System.DefaultWorkingDirectory)/terraform"

          - task: PublishBuildArtifacts@1
            displayName: "Publish Frontend Build Artifacts"
            inputs:
              PathtoPublish: "$(System.DefaultWorkingDirectory)/terraform/dist"
              ArtifactName: "frontend-build"
              publishLocation: "Container"

  - stage: Deploy
    dependsOn: Build
    displayName: "Deploy Application"
    jobs:
      - job: Deploy_Frontend
        displayName: "Deploy Frontend"
        pool:
          name: "Default"
        steps:
          - checkout: self
            clean: "true"

          - task: Bash@3
            displayName: "Upload Frontend Files"
            inputs:
              targetType: "inline"
              script: |
                SCRIPT_FILE=scripts/upload-frontend.sh

                sed -i 's/\r//g' scripts/upload-frontend.sh

                                chmod +x $SCRIPT_FILE

                                $SCRIPT_FILE $(TF_VAR_ENVIRONMENT) dist
              workingDirectory: "$(System.DefaultWorkingDirectory)/terraform"
